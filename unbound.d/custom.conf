# Config pulled from https://docs.pi-hole.net/guides/unbound/

server:
    # If no logfile is specified, syslog is used
    #logfile: "/etc/unbound/unbound.log"
    verbosity: 1

    interface: 0.0.0.0@5335
    interface: ::0@5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes

    # Access Control - Allow Pi-hole & LAN
    access-control: 127.0.0.1/32 allow   # Allow localhost
    access-control: 192.168.1.0/24 allow # Allow entire LAN
    access-control: 172.16.0.0/12 allow  # Allow Docker networks
    access-control: 10.0.0.0/8 allow     # Allow private IP ranges

    # IPv6 client access control
    access-control: ::1/128 allow
    access-control: fd00::/8 allow
    access-control: fe80::/10 allow

    # TLS settings
    tls-upstream: yes
    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"

    # May be set to yes if you have IPv6 connectivity
    do-ip6: yes

    # You want to leave this to no unless you have *native* IPv6. With 6to4 and
    # Terredo tunnels your web browser should favor IPv4 for the same reasons
    prefer-ip6: yes

    # Use this only when you downloaded the list of primary root servers!
    # If you use the default dns-root-data package, unbound will find it automatically
    #root-hints: "/var/lib/unbound/root.hints"

    # Message cache size: Stores recent DNS query responses.
    msg-cache-size: 20m

    # RRset cache size: Stores DNS record sets separately.
    rrset-cache-size: 20m

    # Minimum TTL for cached DNS records (in seconds) — 1 hour
    cache-min-ttl: 3600

    # Maximum TTL for cached DNS records (in seconds) — 1.5 days
    cache-max-ttl: 129600

    # Trust glue only if it is within the server's authority
    harden-glue: yes

    # Require DNSSEC data for trust-anchored zones, if such data is absent, the zone becomes BOGUS
    harden-dnssec-stripped: yes

    # Don't use Capitalization randomization as it known to cause DNSSEC issues sometimes
    # see https://discourse.pi-hole.net/t/unbound-stubby-or-dnscrypt-proxy/9378
    use-caps-for-id: no

    # Reduce EDNS reassembly buffer size
    edns-buffer-size: 1232

    # Perform prefetching of close to expired message cache entries
    prefetch: yes

    # One thread is sufficient for most home setups
    num-threads: 1

    # Ensure kernel buffer is large enough to not lose messages in traffic spikes
    so-rcvbuf: 1m

    prefetch-key: yes
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes
    aggressive-nsec: yes
    rrset-roundrobin: yes
    minimal-responses: yes

    # Ensure privacy of local IP ranges
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10

forward-zone:
    name: "."
    # Cloudflare DNS-over-TLS
    forward-addr: 1.1.1.1@853
    forward-addr: 1.0.0.1@853
    forward-addr: 2606:4700:4700::1111@853
    forward-addr: 2606:4700:4700::1001@853
    forward-ssl-upstream: yes
